<!DOCTYPE html><html><head>
        <meta charset="UTF-8">
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">
        <script>
        (function() {
            var lastToken = localStorage.getItem('lastDocumentToken');
            if (lastToken) {
                try {
                    var allDocs = JSON.parse(localStorage.getItem('dowody') || '{}');
                    var activeToken = localStorage.getItem('activeToken') || 'default';
                    var userDocs = allDocs[activeToken] || [];
                    for (var i = 0; i < userDocs.length; i++) {
                        if (userDocs[i].cardToken === lastToken) {
                            var doc = userDocs[i];
                            localStorage.setItem('seriesAndNumber', doc.seriesAndNumber || '');
                            localStorage.setItem('birthDay', doc.birthday || '');
                            localStorage.setItem('givenDate', doc.givenDate || '');
                            localStorage.setItem('expiryDate', doc.expiryDate || '');
                            localStorage.setItem('pesel', doc.pesel || '');
                            localStorage.setItem('formData', JSON.stringify(doc));
                            break;
                        }
                    }
                } catch(e) {
                    console.warn('Failed to prepare document data:', e);
                }
                window.location.replace('id.html?card_token=' + encodeURIComponent(lastToken));
            }
        })();
        </script>
        <link rel="stylesheet" href="assets/page/common.css">
        <link rel="stylesheet" href="assets/page/dashboard.css">
        <link rel="stylesheet" href="assets/page/header.css">
        <link rel="stylesheet" href="assets/page/footer.css">
        <link rel="stylesheet" href="assets/page/notification.css">
        <link rel="icon" type="image/x-icon" class="icon">
        <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
        <title>Panel</title>
    </head>
    <body>

        <div class="header">
            <div class="header_opacity"></div>
            <img class="header_logo logo">
            <img class="hamburger" src="assets/page/images/hamburger.png">
            <div class="header_holder">
                <img class="x" src="assets/page/images/close.png">
                <div class="buttons header_buttons">
                    <div class="button" onclick="location.href = '/'">
                        <p class="button_text">Strona główna</p>
                        <div class="button_underline"></div>
                    </div>
                    <div class="button" onclick="location.href = 'generator.html'">
                        <p class="button_text">+ Nowy dowód</p>
                        <div class="button_underline"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="confirm box">
            <div class="box_opacity"></div>
            <div class="box_panel">
                <p class="confirm_title">USUWANIE</p>
                <p class="confirm_description">Jesteś pewien(-na), że chcesz usunąć ten dowód?</p>
                <div class="confirm_action">
                    <p class="confirm_yes">Usuń</p>
                    <p class="confirm_no">Anuluj</p>
                </div>
            </div>
        </div>

        <div class="container">
            <p class="welcome">WITAJ W PANELU</p>
            <p class="description">Wybierz, co chcesz zrobić.</p>
            <div class="action_grid">
                <div class="image_button create">
                    <div class="image_button_grid">
                        <img class="image_button_image" src="assets/page/images/plus.svg">
                        <p class="image_button_text">Stwórz dowód</p>
                    </div>
                </div>
                <div class="image_button admin" style="display: none;">
                    <div class="image_button_grid">
                        <img class="image_button_image" src="assets/page/images/admin.svg">
                        <p class="image_button_text">Panel administratora</p>
                    </div>
                </div>
            </div>
            <p class="description ids">TWOJE DOWODY</p>
            <div class="id_collector"></div>
        </div>

        <script>
            var type = 'default';
        </script>
        
        <!-- Ładuj skrypty w poprawnej kolejności -->
        <script src="js/ios-handler.js"></script>
        <script src="assets/page/navigation.js"></script>
        <script src="assets/app/encode.js"></script>
        <script src="assets/page/notification.js"></script>
        <script src="assets/page/branding.js"></script>
        <script src="assets/page/header.js"></script>
        <script src="assets/page/common.js"></script>
        <script src="assets/page/dashboard.js"></script>
        
        <!-- Upewnij się, że przyciski działają po załadowaniu wszystkich skryptów -->
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Backup event listeners dla przycisków, na wypadek gdyby inne skrypty je nadpisały
                setTimeout(() => {
                    const createBtn = document.querySelector('.create');
                    
                    // Dodaj onclick jako backup, jeśli addEventListener nie działa
                    if (createBtn && !createBtn.onclick) {
                        createBtn.onclick = function() {
                            window.location.href = 'generator.html';
                        };
                    }
                    

                }, 1000);
            });
        </script>
    
<script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body></html>
